<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>NOBEL STORE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;

  /* الخلفية */
  background: url("https://cdn.discordapp.com/attachments/1484212180491571456/1499870632526086335/content.png?ex=69f65ee1&is=69f50d61&hm=2c359ffe729994e08b78befcfa7b4594b1a69c85f5e521a99b554e9689b24d0b&") no-repeat center center fixed;
  background-size: cover;
}

/* طبقة غامقة فوق الصورة */
.overlay {
  background: rgba(0,0,0,0.75);
  min-height: 100vh;
  padding: 20px;
}

/* اللوقو */
.logo {
  margin-top: 40px;
}

.logo img {
  width: 180px;
}

/* العنوان */
h1 {
  font-size: 50px;
  margin: 10px 0;
  color: gold;
}

/* النص */
.subtitle {
  color: #ddd;
  font-size: 18px;
}

/* المنتجات */
.products {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 40px;
}

.card {
  background: rgba(0,0,0,0.8);
  padding: 20px;
  width: 260px;
  border-radius: 12px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  background: gold;
  color: black;
  border-radius: 6px;
  cursor: pointer;
}

/* الديسكورد */
.discord {
  margin-top: 40px;
  padding: 12px;
  border: 1px solid #555;
  display: inline-block;
  border-radius: 10px;
  cursor: pointer;
}

/* الترحيب */
.welcome {
  margin-top: 30px;
  font-size: 22px;
  color: #ccc;
}

/* البوب اب */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

.box {
  background: #111;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  position: relative;
}

/* زر X */
.close {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="overlay">

<!-- اللوقو -->
<div class="logo">
  <img src="YOUR-LOGO.png">
</div>

<h1>NOBEL STORE</h1>
<p class="subtitle">أفضل متجر لبيع ملفات فايف إم وخدمات الديسكورد</p>

<!-- المنتجات -->
<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/250x150">
    <h3>ملفات FiveM</h3>
    <p>$12</p>
    <button onclick="buy()">اشتراك</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250x150">
    <h3>بوتات ديسكورد</h3>
    <p>$7</p>
    <button onclick="buy()">اشتراك</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250x150">
    <h3>خدمات برمجية</h3>
    <p>$15</p>
    <button onclick="buy()">اشتراك</button>
  </div>

</div>

<!-- الديسكورد -->
<div class="discord" onclick="goDiscord()">
  discord.gg/wckgWaquq
</div>

<!-- الترحيب تحت -->
<div class="welcome">
  حياك الله في متجر نوبل ستور
</div>

</div>

<!-- البوب اب -->
<div id="popup">
  <div class="box">

    <span class="close" onclick="closePopup()">❌</span>

    <h2>تم الطلب ✅</h2>
    <p>كودك:</p>
    <h3 id="code"></h3>

    <p>توجه للديسكورد وافتح تذكرة وسلم الكود</p>

    <button onclick="goDiscord()">الديسكورد</button>

  </div>
</div>

<script>
function buy() {
  let code = "NOBEL-" + Math.floor(Math.random() * 999999);
  document.getElementById("code").innerText = code;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

function goDiscord() {
  window.open("https://discord.gg/wckgWaquq");
}
</script>

</body>
</html>
