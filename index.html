<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>NOBEL STORE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: #e5e5e5;
  text-align: center;
}

/* رسالة الترحيب */
.welcome {
  position: fixed;
  top: 10px;
  right: 15px;
  font-size: 14px;
  color: #aaa;
}

/* العنوان */
h1 {
  margin-top: 80px;
  font-size: 40px;
}

/* كرت المنتج */
.card {
  background: #111;
  width: 280px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 12px;
}

/* زر */
button {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  border: none;
  background: #ddd;
  color: black;
  border-radius: 6px;
  cursor: pointer;
}

/* مربع الديسكورد */
.discord-box {
  margin-top: 30px;
  display: inline-block;
  padding: 10px 20px;
  border: 1px solid #444;
  border-radius: 8px;
  cursor: pointer;
}

/* البوب اب */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

.box {
  background: #111;
  padding: 25px;
  border-radius: 10px;
  width: 300px;
  position: relative;
}

/* زر X */
.close {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="welcome">حياك الله في متجر نوبل ستور</div>

<h1>NOBEL STORE</h1>

<div class="card">
  <h2>منتج 1</h2>
  <p>سعر: $12</p>
  <button onclick="buy()">اشتراك</button>
</div>

<!-- اختصار الديسكورد -->
<div class="discord-box" onclick="goDiscord()">
  discord.gg/wckgWaquq
</div>

<!-- البوب اب -->
<div id="popup">
  <div class="box">
    
    <span class="close" onclick="closePopup()">❌</span>

    <h2>تم الطلب ✅</h2>
    <p>كودك:</p>
    <h3 id="code"></h3>

    <p>توجه للديسكورد وافتح تذكرة وسلم الكود</p>

    <button onclick="goDiscord()">الديسكورد</button>

  </div>
</div>

<script>
function buy() {
  let code = "NOBEL-" + Math.floor(Math.random() * 999999);
  document.getElementById("code").innerText = code;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

function goDiscord() {
  window.open("https://discord.gg/wckgWaquq");
}
</script>

</body>
</html>
